<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Customer Support</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 400px; height: 600px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #e63946; color: white; padding: 20px; text-align: center; }
        .chat-header h2 { font-size: 18px; }
        .chat-header p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.4; }
        .bot-message { background: #f0f2f5; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        .user-message { background: #e63946; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .chat-input { padding: 16px; border-top: 1px solid #eee; display: flex; gap: 8px; }
        .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 24px; outline: none; font-size: 14px; }
        .chat-input input:focus { border-color: #e63946; }
        .chat-input button { background: #e63946; color: white; border: none; padding: 10px 18px; border-radius: 24px; cursor: pointer; font-size: 14px; }
        .chat-input button:hover { background: #c1121f; }
        .typing { color: #999; font-style: italic; font-size: 13px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>🍕 Mario's Pizza</h2>
            <p>AI Customer Support • Always Online</p>
        </div>
        <div class="chat-messages" id="messages">
            <div class="message bot-message">
                Hi! Welcome to Mario's Pizza! 🍕 How can I help you today?
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Ask me anything..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');

        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            userInput.value = '';

            const typing = addMessage('Typing...', 'bot', true);

            try {
                const response = await fetch('https://web-production-a47d3.up.railway.app/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        business_id: 'marios-pizza'
                    })
                });
                const data = await response.json();
                typing.remove();
                addMessage(data.response, 'bot');
            } catch (error) {
                typing.remove();
                addMessage('Sorry, something went wrong!', 'bot');
            }
        }

        function addMessage(text, sender, isTyping = false) {
            const div = document.createElement('div');
            div.className = `message ${sender}-message${isTyping ? ' typing' : ''}`;
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
